services:
  wol-backend:
    build: ./backend
    container_name: wol-backend
    restart: unless-stopped
    network_mode: "host"
    env_file: ./backend/.env # Lädt die restlichen NestJS-Variablen
    environment:
      - PORT=${BACKEND_PORT} # Überschreibt den Port aus der zentralen .env

  wol-frontend:
    build: ./frontend
    container_name: wol-frontend
    restart: unless-stopped
    network_mode: "host"
    environment:
      - PORT=${FRONTEND_PORT} # Reicht 6020 an den Frontend-Container weiter
    depends_on:
      - wol-backend