services:
  wol-backend:
    build: ./backend
    container_name: wol-backend
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env

  wol-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${BACKEND_URL:-http://127.0.0.1:6010}
        FRONTEND_PORT: ${FRONTEND_PORT:-6020}
    container_name: wol-frontend
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    depends_on:
      - wol-backend
