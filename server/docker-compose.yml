services:
  wol-backend:
    build: ./backend
    container_name: wol-backend
    network_mode: host
    restart: unless-stopped
    cap_add:
      - NET_RAW
      - NET_ADMIN
    env_file:
      - .env
    # --- NEU: Volume mounten ---
    volumes:
      - wol_db_data:/app/prisma
    # ---------------------------

  wol-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${BACKEND_URL:?BACKEND_URL is required}
        FRONTEND_PORT: ${FRONTEND_PORT:?FRONTEND_PORT is required}
    container_name: wol-frontend
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - wol-backend

# --- NEU: Das benannte Volume ganz unten definieren ---
volumes:
  wol_db_data: